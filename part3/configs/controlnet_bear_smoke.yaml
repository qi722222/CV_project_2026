sequence_name: bear

paths:
  input_frames_dir: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/bear
  masks_dir: /home/jli657/shared_data/project3/DAVIS/Annotations/480p/bear
  output_dir: /home/jli657/my_storage2_1T/project3/part3/outputs/controlnet/bear_smoke

keyframe_policy:
  mask_area_ratio_threshold: 0.01
  max_keyframes_per_sequence: 1
  global_max_keyframes: 1
  force_frame_indices: [0]

refine:
  mode: sd_controlnet
  prompt: clean natural background, remove bear naturally, preserve forest scene structure
  negative_prompt: artifacts, blurry, distorted geometry, duplicated objects, ghosting
  use_controlnet: true
  controlnet_type: canny
  sd_model_id: runwayml/stable-diffusion-inpainting
  controlnet_model_id: lllyasviel/control_v11p_sd15_canny
  canny_low_threshold: 100
  canny_high_threshold: 200
  mask_dilate_px: 7
  num_inference_steps: 4
  guidance_scale: 7.0
  strength: 0.95
  controlnet_conditioning_scale: 0.7
  max_infer_side: 384

runtime:
  seed: 42
  device: cpu
  save_debug_overlays: true
  export_refined_video: true
  video_fps: 6
