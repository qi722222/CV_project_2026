sequence_name: tennis

paths:
  input_frames_dir: /data3/jli657/project3/part2/outputs/tennis_v3/tennis
  masks_dir: /data3/jli657/project3/part2/masks_cache/tennis_v3
  output_dir: /data3/jli657/project3/part3/outputs/controlnet/tennis

keyframe_policy:
  mask_area_ratio_threshold: 0.12
  max_keyframes_per_sequence: 3
  global_max_keyframes: 5
  force_frame_indices: []

refine:
  mode: sd_controlnet
  prompt: clean tennis court background, remove players and racket naturally
  negative_prompt: artifacts, blurry, distorted geometry, duplicated limbs, ghosting
  use_controlnet: true
  controlnet_type: canny
  sd_model_id: runwayml/stable-diffusion-inpainting
  controlnet_model_id: lllyasviel/control_v11p_sd15_canny
  canny_low_threshold: 100
  canny_high_threshold: 200
  mask_dilate_px: 9
  num_inference_steps: 15
  guidance_scale: 7.5
  strength: 0.99
  controlnet_conditioning_scale: 0.8
  max_infer_side: 512

runtime:
  seed: 42
  device: cpu
  save_debug_overlays: true
  export_refined_video: true
