sequence_name: tennis

paths:
  # ProPainter输出帧目录（或任意待精修帧目录）
  input_frames_dir: /home/jli657/my_storage2_1T/project3/part2/outputs/tennis_v3/tennis
  # 对齐的二值mask目录
  masks_dir: /home/jli657/my_storage2_1T/project3/part2/masks_cache/tennis_v3
  # Part3输出目录
  output_dir: /home/jli657/my_storage2_1T/project3/part3/outputs/tennis

keyframe_policy:
  mask_area_ratio_threshold: 0.15
  max_keyframes_per_sequence: 3
  global_max_keyframes: 5
  # 可选，若为空则根据候选自动均匀采样
  force_frame_indices: []

refine:
  # skeleton阶段默认使用copy_fallback，保证可运行
  mode: copy_fallback
  # 当 mode=sd_controlnet 时，请使用 controlnet_env（见 part3/requirements_controlnet.txt）
  prompt: clean background, remove target object naturally
  negative_prompt: artifacts, blurry, distorted geometry
  use_controlnet: true
  controlnet_type: canny
  sd_model_id: runwayml/stable-diffusion-inpainting
  controlnet_model_id: lllyasviel/control_v11p_sd15_canny
  canny_low_threshold: 100
  canny_high_threshold: 200
  mask_dilate_px: 9
  num_inference_steps: 30
  guidance_scale: 7.5
  strength: 0.99
  controlnet_conditioning_scale: 0.8
  max_infer_side: 768

runtime:
  seed: 42
  # auto | cuda | cpu
  device: auto
  save_debug_overlays: true
  export_refined_video: true
