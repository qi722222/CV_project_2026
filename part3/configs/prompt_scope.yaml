# prompt_scope.yaml
# prompt schemaDirection A/B
#   - hard_targets:
#   - soft_targets:
#   - sam3_official_prompts: Official SAM3 video text prompt
#   - gdino_prompts: GDINO bounding-box prompt VLM
#   - vlm_token_map: VLM caption  → GDINO prompt

# =====================================================================
# =====================================================================

sequences:

  # ---- wild_video-1person ----
  - sequence_name: wild_video-1person
    constraint: hard
    hard_targets:
      - person
      - bag
      - ground shadow
    gdino_prompts: "person . bag . backpack . shadow"
    sam3_official_prompts:
      - "person"
      - "bag"
      - "backpack"
      - "pedestrian"
    video_root: /home/jli657/my_storage2_1T/project3/wild_frames/wild_video-1person
    notes: >
      + SAM3  prompt

  # ---- tennis ----
  - sequence_name: tennis
    constraint: hard
    hard_targets:
      - person
      - tennis racket
      - tennis ball
    gdino_prompts: "person . tennis racket . tennis ball"
    # prompt JM
    #   "tennis player with racket and ball" JM=0.9468 > Part2(0.932) ✓
    #   "tennis player" JM=0.8824
    sam3_official_prompts:
      - "tennis player with racket and ball"
    sam3_search_prompts:
      - "tennis player with racket and ball"
      - "tennis player"
      - "athlete with racket"
      - "tennis player holding racket"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/tennis
    notes: >
       prompt  SAM3mask union
       prompt"tennis player with racket and ball" SAM3  JM=0

  # ---- koala ----
  - sequence_name: koala
    constraint: hard
    hard_targets:
      - koala
    gdino_prompts: "koala"
    # koala JM=0.9482
    sam3_official_prompts:
      - "koala"
    sam3_search_prompts:
      - "koala"
      - "koala bear"
      - "animal"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/koala
    notes: "koala" JM=0.9482

# =====================================================================
# DAVIS5 prompt
# =====================================================================

  - sequence_name: bmx-trees
    constraint: soft
    hard_targets:
      - person
      - bicycle
    gdino_prompts: "person . bicycle"
    sam3_official_prompts:
      - "bicycle rider"
      - "bicycle"
    sam3_search_prompts:
      - "bicycle rider"
      - "bmx rider"
      - "cyclist"
      - "bicycle"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/bmx-trees
    notes: >
       Official SAM3 best  "bicycle rider" (JM=0.517)
       "bicycle rider" "bicycle"

  - sequence_name: blackswan
    constraint: soft
    hard_targets:
      - black swan
    gdino_prompts: "black swan"
    sam3_official_prompts:
      - "bird"
      - "black swan"
      - "swan"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/blackswan
    notes:  "bird"  (JM=0.955)

  - sequence_name: car-shadow
    constraint: soft
    hard_targets:
      - car
    gdino_prompts: "car"
    sam3_official_prompts:
      - "car"
      - "automobile"
      - "vehicle"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/car-shadow
    notes:  "car"  (JM=0.901)

  - sequence_name: horsejump-low
    constraint: soft
    hard_targets:
      - horse
      - person
    gdino_prompts: "horse . person"
    sam3_official_prompts:
      - "horse"
      - "person"
    sam3_search_prompts:
      - "horse"
      - "equestrian"
      - "person"
      - "rider"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/horsejump-low
    notes:  "horse"  (JM=0.728)horse+person

# =====================================================================
