# prompt_scope.yaml
# 全量序列多目标范围与 prompt schema（Direction A/B 共用）
# 规则：
#   - hard_targets: 必须全部移除（强约束序列）
#   - soft_targets: 尽量移除，可随检测效果自适应
#   - sam3_official_prompts: Official SAM3 video text prompt 候选列表（逐一搜索取最优）
#   - gdino_prompts: GDINO bounding-box prompt（同时也是 VLM 归一化目标词表）
#   - vlm_token_map: VLM caption 关键词 → GDINO prompt 映射

# =====================================================================
# 强约束序列（必须多目标联合移除）
# =====================================================================

sequences:

  # ---- 强约束：wild_video-1person ----
  - sequence_name: wild_video-1person
    constraint: hard
    hard_targets:
      - person
      - bag
      - ground shadow
    gdino_prompts: "person . bag . backpack . shadow"
    sam3_official_prompts:
      - "person"
      - "bag"
      - "backpack"
      - "pedestrian"
    video_root: /home/jli657/my_storage2_1T/project3/wild_frames/wild_video-1person
    notes: >
      人物、肩包、地面阴影三者需同步消除；
      阴影用形态学膨胀+光流推断，不依赖 SAM3 文字 prompt。

  # ---- 强约束：tennis ----
  - sequence_name: tennis
    constraint: hard
    hard_targets:
      - person
      - tennis racket
      - tennis ball
    gdino_prompts: "person . tennis racket . tennis ball"
    # 已确认最优 prompt（修复 JM 阈值后重测）：
    #   "tennis player with racket and ball" JM=0.9468 > Part2(0.932) ✓
    #   "tennis player" JM=0.8824（单目标，对比基线）
    sam3_official_prompts:
      - "tennis player with racket and ball"
    sam3_search_prompts:
      - "tennis player with racket and ball"
      - "tennis player"
      - "athlete with racket"
      - "tennis player holding racket"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/tennis
    notes: >
      三目标联合。每个目标分别用简单 prompt 运行 SAM3，mask union。
      复合描述型 prompt（"tennis player with racket and ball"）在 SAM3 中 JM=0，已弃用。

  # ---- 强约束：koala ----
  - sequence_name: koala
    constraint: hard
    hard_targets:
      - koala
    gdino_prompts: "koala"
    # 已确认最优：koala JM=0.9482（三个候选都很接近）
    sam3_official_prompts:
      - "koala"
    sam3_search_prompts:
      - "koala"
      - "koala bear"
      - "animal"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/koala
    notes: 单目标但需纳入全量评估集。"koala" JM=0.9482（最优）。

# =====================================================================
# DAVIS5 标准序列（自适应多目标，prompt 已搜索过最优单目标）
# =====================================================================

  - sequence_name: bmx-trees
    constraint: soft
    hard_targets:
      - person
      - bicycle
    gdino_prompts: "person . bicycle"
    sam3_official_prompts:
      - "bicycle rider"
      - "bicycle"
    sam3_search_prompts:
      - "bicycle rider"
      - "bmx rider"
      - "cyclist"
      - "bicycle"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/bmx-trees
    notes: >
      已知 Official SAM3 best 是 "bicycle rider" (JM=0.517)；
      多目标策略：骑手用 "bicycle rider"，自行车用 "bicycle" 单独追踪，并集提升覆盖率。

  - sequence_name: blackswan
    constraint: soft
    hard_targets:
      - black swan
    gdino_prompts: "black swan"
    sam3_official_prompts:
      - "bird"
      - "black swan"
      - "swan"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/blackswan
    notes: 单目标，已知 "bird" 最佳 (JM=0.955)。

  - sequence_name: car-shadow
    constraint: soft
    hard_targets:
      - car
    gdino_prompts: "car"
    sam3_official_prompts:
      - "car"
      - "automobile"
      - "vehicle"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/car-shadow
    notes: 单目标，已知 "car" 最佳 (JM=0.901)。

  - sequence_name: horsejump-low
    constraint: soft
    hard_targets:
      - horse
      - person
    gdino_prompts: "horse . person"
    sam3_official_prompts:
      - "horse"
      - "person"
    sam3_search_prompts:
      - "horse"
      - "equestrian"
      - "person"
      - "rider"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/horsejump-low
    notes: 已知 "horse" 最佳 (JM=0.728)；多目标策略：horse+person 分别追踪并集覆盖骑手。

# =====================================================================
# 扩展集（如有资源则运行）
# =====================================================================

  - sequence_name: bear
    constraint: soft
    hard_targets:
      - bear
    gdino_prompts: "bear"
    sam3_official_prompts:
      - "bear"
      - "grizzly bear"
      - "brown bear"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/bear
    notes: 扩展集序列，单目标。

  - sequence_name: camel
    constraint: soft
    hard_targets:
      - camel
    gdino_prompts: "camel"
    sam3_official_prompts:
      - "camel"
      - "dromedary"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/camel
    notes: 扩展集序列，单目标。

# =====================================================================
# VLM token 归一化映射（Direction B 核心）
# =====================================================================
vlm_token_map:
  # 人物类
  "person": "person"
  "man": "person"
  "woman": "person"
  "pedestrian": "person"
  "athlete": "person"
  "player": "person"
  "rider": "person"
  "cyclist": "person"
  # 运动器材
  "racket": "tennis racket"
  "tennis racket": "tennis racket"
  "bat": "tennis racket"
  "ball": "tennis ball"
  "tennis ball": "tennis ball"
  # 随身物品
  "bag": "bag"
  "backpack": "bag"
  "handbag": "bag"
  "luggage": "bag"
  "purse": "bag"
  # 阴影（特殊处理：形态学推断）
  "shadow": "__morphological__"
  "ground shadow": "__morphological__"
  # 动物
  "koala": "koala"
  "koala bear": "koala"
  "bear": "bear"
  "camel": "camel"
  "swan": "black swan"
  "bird": "black swan"
  "horse": "horse"
  "bicycle": "bicycle"
  "bike": "bicycle"
  "car": "car"
  "vehicle": "car"
  "automobile": "car"

