  - sequence_name: bear
    constraint: soft
    hard_targets:
      - bear
    gdino_prompts: "bear"
    sam3_official_prompts:
      - "bear"
      - "grizzly bear"
      - "brown bear"
    video_root: /home/jli657/shared_data/project3/DAVIS/JPEGImages/480p/bear
